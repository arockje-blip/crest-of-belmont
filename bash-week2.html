<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week Two | Weekly Bash - Lumina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #d9a65a;
      --bg-deep: #c28e43;
      --surface: #4a3421;
      --surface-soft: #5c4229;
      --panel: #2f2116;
      --text-dark: #3c2919;
      --text-gold: #efc784;
      --text-ivory: #f7ebcf;
      --shadow: 0 22px 50px rgba(43, 29, 16, 0.22);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: "Cormorant Garamond", serif;
      color: var(--text-dark);
      background:
        radial-gradient(circle at top left, rgba(255, 237, 202, 0.34), transparent 28%),
        linear-gradient(180deg, #e0af63 0%, var(--bg) 38%, var(--bg-deep) 100%);
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px;
    }

    .container {
      width: min(100%, 800px);
      text-align: center;
    }

    .header {
      margin-bottom: 50px;
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 10px; margin-bottom: 18px;
      padding: 8px 14px; border-radius: 999px; background: rgba(255, 255, 255, 0.12);
      font-family: "Cinzel", serif; font-size: 0.95rem; letter-spacing: 0.12em; text-transform: uppercase;
    }

    .header h1 {
      margin: 0; font-family: "Cinzel", serif; font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--panel);
    }

    .clan-logo-header {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid var(--panel);
      margin: 20px 0;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    /* ── TIMELINE ── */
    .timeline {
      position: relative;
      margin: 40px auto;
      padding: 20px 0;
      text-align: left;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 31px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--panel);
      opacity: 0.3;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 30px;
      padding-left: 80px;
    }

    .timeline-dot {
      position: absolute;
      left: 20px;
      top: 5px;
      width: 24px;
      height: 24px;
      background: var(--panel);
      border-radius: 50%;
      border: 4px solid var(--text-ivory);
      z-index: 2;
    }

    .timeline-content {
      background: var(--panel);
      color: var(--text-ivory);
      padding: 20px 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .timeline-content:hover {
      transform: translateX(10px);
    }

    .timeline-time {
      font-family: "Cinzel", serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: var(--text-gold);
      margin-bottom: 5px;
      display: block;
    }

    .timeline-title {
      font-family: "Cinzel", serif;
      font-size: 1.3rem;
      margin: 0;
      letter-spacing: 0.05em;
    }

    /* ── EVENT HIGHLIGHTS ── */
    .event-highlights {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 2px solid var(--panel);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .gallery-item {
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: var(--panel);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .gallery-item:hover {
      transform: translateY(-8px) scale(1.03);
    }

    /* ── WEEK NAVIGATION ── */
    .week-navigation {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 60px 0 30px;
      padding-top: 30px;
      border-top: 1px solid rgba(47, 33, 22, 0.15);
    }

    .nav-btn {
      text-decoration: none;
      font-family: "Cinzel", serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 24px;
      border-radius: 50px;
      background: var(--panel);
      color: var(--text-gold);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .nav-btn:hover {
      background: var(--surface);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      color: white;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .back-link {
      margin-top: 60px;
      display: inline-block;
      color: var(--panel);
      font-family: "Cinzel", serif;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.1em;
      border-bottom: 2px solid transparent;
      transition: border-color 0.3s;
    }

    .back-link:hover { border-color: var(--panel); }
  </style>
</head>
<body>

    <div class="week-navigation">

  </div>
</body>
