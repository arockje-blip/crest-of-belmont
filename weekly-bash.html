<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Bash Center | Belmont Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #d9a65a;
      --bg-deep: #c28e43;
      --surface: #4a3421;
      --surface-soft: #5c4229;
      --panel: #2f2116;
      --text-dark: #3c2919;
      --text-gold: #efc784;
      --text-ivory: #f7ebcf;
      --shadow: 0 22px 50px rgba(43, 29, 16, 0.22);
      --shadow-strong: 0 24px 55px rgba(25, 16, 9, 0.38);
      --radius-lg: 28px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: "Cormorant Garamond", serif;
      color: var(--text-dark);
      background:
        radial-gradient(circle at top left, rgba(255, 237, 202, 0.34), transparent 28%),
        linear-gradient(180deg, #e0af63 0%, var(--bg) 38%, var(--bg-deep) 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: min(100%, 1000px);
      text-align: center;
    }

    .header {
      margin-bottom: 50px;
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 10px; margin-bottom: 18px;
      padding: 8px 14px; border-radius: 999px; background: rgba(255, 255, 255, 0.12);
      font-family: "Cinzel", serif; font-size: 0.95rem; letter-spacing: 0.12em; text-transform: uppercase;
    }

    .header h1 {
      margin: 0; font-family: "Cinzel", serif; font-size: clamp(2.4rem, 5vw, 4rem);
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--panel);
    }

    .bash-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      margin-top: 40px;
    }

    @media (max-width: 900px) { .bash-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .bash-grid { grid-template-columns: 1fr; } }

    .bash-card {
      position: relative;
      padding: 40px 20px;
      background: #000000;
      color: #ffffff;
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      text-decoration: none;
      font-family: "Cinzel", serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      overflow: hidden;
    }

    .bash-card::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(45deg, transparent, rgba(239, 199, 132, 0.1), transparent);
      transform: translateX(-100%); transition: transform 0.6s ease;
    }

    .bash-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: #efc784;
      box-shadow: 0 20px 40px rgba(25, 16, 9, 0.5);
    }

    /* Reflection CTA Styling */
    .reflection-cta {
      display: flex;
      align-items: center;
      gap: 25px;
      margin: 0 auto 50px;
      padding: 30px 40px;
      max-width: 600px;
      background: linear-gradient(135deg, #2f2116 0%, #4a3421 100%);
      border: 3px solid #d9a65a;
      border-radius: 24px;
      text-decoration: none;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }

    .reflection-cta::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(217, 166, 90, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .reflection-cta:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 60px rgba(217, 166, 90, 0.25);
      border-color: #efc784;
    }

    .reflection-cta:hover::after {
      opacity: 1;
    }

    .cta-icon {
      font-size: 3rem;
      color: #d9a65a;
      text-shadow: 0 0 15px rgba(217, 166, 90, 0.4);
    }

    .cta-text {
      text-align: left;
      display: flex;
      flex-direction: column;
    }

    .cta-eyebrow {
      font-family: "Cinzel", serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #efc784;
      margin-bottom: 4px;
    }

    .cta-title {
      font-family: "Cinzel", serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @media (max-width: 600px) {
      .reflection-cta { padding: 20px; gap: 15px; }
      .cta-title { font-size: 1.3rem; }
      .cta-icon { font-size: 2.2rem; }
    }

    .bash-card:hover::before { transform: translateX(100%); }

    .bash-logo {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid rgba(239, 199, 132, 0.4);
      box-shadow: 0 0 15px rgba(239, 199, 132, 0.2);
    }

    .bash-card:hover .bash-logo {
      border-color: #efc784;
      transform: scale(1.1);
      transition: all 0.4s ease;
    }

    .back-link {
      margin-top: 60px;
      display: inline-block;
      color: var(--panel);
      font-family: "Cinzel", serif;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.1em;
      border-bottom: 2px solid transparent;
      transition: border-color 0.3s;
    }

    .back-link:hover { border-color: var(--panel); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="eyebrow">Clan Events</div>
      <h1>Rookie Weekly Bash</h1>
    </div>

    <!-- Overall Reflection Button -->
    <a href="reflection.html" class="reflection-cta">
      <div class="cta-icon">✧</div>
      <div class="cta-text">
        <span class="cta-eyebrow">The Journey's End</span>
        <span class="cta-title">View Overall Reflection</span>
      </div>
    </a>

    <!-- NEW: COMBINED VIEW LINK -->
    <a href="weekly-bash-full.html" class="reflection-cta" style="margin-top: -30px; margin-bottom: 50px; background: linear-gradient(135deg, #bc6ff1 0%, #892cdc 100%); border-color: #fff;">
      <div class="cta-icon">📚</div>
      <div class="cta-text">
        <span class="cta-eyebrow">All Weeks in One</span>
        <span class="cta-title">Weekly Bash Chronicles</span>
      </div>
    </a>

    <div class="bash-grid">
      <a href="bash-week1.html" class="bash-card">
        <img src="images/rookies.png" alt="Week 1 Logo" class="bash-logo">
        Week One
      </a>
      <a href="bash-week2.html" class="bash-card">
        <img src="images/lumina.jpg" alt="Week 2 Logo" class="bash-logo">
        Week Two
      </a>
      <a href="bash-week3.html" class="bash-card">
        <img src="images/adepti.jpg" alt="Week 3 Logo" class="bash-logo">
        Week Three
      </a>
      <a href="bash-week4.html" class="bash-card">
        <img src="images/w b media/bellbash.jpg" alt="Week 4 Logo" class="bash-logo">
        Week Four
      </a>
      <a href="bash-week5.html" class="bash-card">
        <img src="images/aura.jpg" alt="Week 5 Logo" class="bash-logo">
        Week Five
      </a>
      <a href="bash-week6.html" class="bash-card">
        <img src="images/belmontslogo.jpg" alt="Week 6 Logo" class="bash-logo">
        Week Six
      </a>
      <a href="bash-week7.html" class="bash-card">
        <img src="images/w b media/bashers.png" alt="Week Seven Logo" class="bash-logo">
        Week Seven
      </a>
    </div>

    <a href="rookies.html" class="back-link">← Return to Rookies</a>
  </div>
</body>
</html>
